name: Publish lint

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      tagged: ${{ steps.bump.outputs.tagged }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create changelog
        id: bump
        run: |
          CURRENT_VERSION=$(cz version --project)
          CURRENT_TAG="v${CURRENT_VERSION}"

          if ! git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
            if grep -qE "^## v?${CURRENT_VERSION}([[:space:]-]|$)" CHANGELOG.md; then
              git tag "${CURRENT_TAG}"
              echo "Baseline tag ${CURRENT_TAG} created"
              echo "bumped=false" >> $GITHUB_OUTPUT
              echo "tagged=true" >> $GITHUB_OUTPUT
              echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          cz bump --yes --changelog 2>&1 | tee bump_output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if grep -qE "No commits found|No new commits found|is not a bump|NO_COMMITS_TO_BUMP|NO_COMMITS_FOUND" bump_output.txt; then
            echo "No version bump needed"
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "tagged=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "tagged=true" >> $GITHUB_OUTPUT
            NEW_VERSION=$(cz version --project)
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            cat bump_output.txt
            exit 1
          fi

      - name: Push changes
        if: steps.bump.outputs.tagged == 'true'
        run: |
          git pull --rebase origin main
          git push origin main --tags

  release-python:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-and-tag.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - uses: arduino/setup-task@v2

      - name: Install Python dependencies
        run: task python:install

      - name: Build Python package
        run: task python:build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-and-tag.outputs.version }}
          name: pragma-lint v${{ needs.bump-and-tag.outputs.version }}
          files: |
            python/dist/*.tar.gz
            python/dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  release-npm:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-and-tag.outputs.version }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - uses: arduino/setup-task@v2

      - name: Install JS dependencies
        run: task js:install

      - name: Build npm package
        run: task js:build

      - name: Publish to npm
        working-directory: js
        run: pnpm publish --access public --provenance --no-git-checks
