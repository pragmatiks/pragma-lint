name: Publish JS

concurrency:
  group: pragma-lint-publish
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - "js/**"
      - "rules/**"
      - ".github/workflows/publish-js.yaml"
  workflow_dispatch:

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv python install 3.13
      - run: uv tool install commitizen
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        id: bump
        working-directory: js
        run: |
          set +e
          cz bump --yes --changelog
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 21 ]; then
            echo "bumped=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            NEW_VERSION=$(cz version --project)
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            exit $EXIT_CODE
          fi
      - name: Push tag back
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git pull --rebase origin main
          git push origin main --tags

  release-npm:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: js-v${{ needs.bump-and-tag.outputs.version }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"
          cache-dependency-path: js/pnpm-lock.yaml
      - uses: arduino/setup-task@v2
      - name: Build
        working-directory: js
        run: |
          pnpm install --frozen-lockfile
          task build
      - name: Publish to npm
        working-directory: js
        run: pnpm publish --access public --provenance --no-git-checks
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: js-v${{ needs.bump-and-tag.outputs.version }}
          name: "@pragmatiks/lint v${{ needs.bump-and-tag.outputs.version }}"
          generate_release_notes: true
